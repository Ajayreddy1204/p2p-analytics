# Production Configuration
app:
  name: DealerPulse
  version: 1.0.0
  env: production
  debug: false

database:
  type: redshift
  redshift:
    host: your-redshift-cluster.xxx.redshift.amazonaws.com
    port: 5439
    database: dealer_prod
    user: ${REDSHIFT_USER}
    password: ${REDSHIFT_PASSWORD}
  aurora:
    host: your-aurora-cluster.cluster-xxx.us-east-1.rds.amazonaws.com
    port: 5432
    database: dealer_prod
    user: ${AURORA_USER}
    password: ${AURORA_PASSWORD}

aws:
  region: us-east-1
  bedrock_model: anthropic.claude-3-sonnet-20240229-v1:0
  amazon_q_application_id: ${AMAZON_Q_APP_ID}
  max_tokens: 4096
  temperature: 0.7

logging:
  level: INFO
  file: /var/log/dealerpulse/dealerpulse.log

session:
  ttl_seconds: 86400
  cache_ttl_seconds: 3600
  max_sessions: 10000

kpi:
  thresholds:
    margin:
      critical: 10
      warning: 20
    stock_availability:
      critical: 50
      warning: 70
    repair_tat:
      critical: 72
      warning: 48
    ccc:
      critical: 75
      warning: 60

ui:
  page_title: DealerPulse - P2P Analytics Dashboard
  page_icon: 📊
  layout: wide
  initial_sidebar_state: collapsed
  title: DealerPulse
  subtitle: Dealer Performance Analytics
  colors:
    primary: "#2563eb"
    primary_dark: "#1e40af"
    secondary: "#06b6d4"
    success: "#10b981"
    warning: "#f59e0b"
    danger: "#ef4444"