
app:
  name: DealerPulse
  version: 1.0.0
  env: development
  debug: true

database:
  type: glue
  glue_database: dealers
  region: us-east-1
  s3_output: s3://aws-athena-query-results-us-east-1/glue-results/

aws:
  enabled: true
  region: us-east-1
  glue:
    database: dealers
  athena:
    output_location: s3://aws-athena-query-results-us-east-1/glue-results/

logging:
  level: INFO
  file: logs/dealerpulse.log

ui:
  page_title: DealerPulse - P2P Analytics Dashboard
  page_icon: 📊
  layout: wide
  initial_sidebar_state: collapsed
  title: DealerPulse
  subtitle: Dealer Performance Analytics
